<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0c0d13;
      color: #eeeef8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── Login ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .login-card {
      background: #13141f; border: 1px solid #1e2030; border-radius: 20px;
      padding: 48px 40px; width: 380px; text-align: center;
    }
    .logo { font-size: 26px; font-weight: 700; letter-spacing: .15em; margin-bottom: 6px; }
    .logo span { color: #a78bfa; }
    .login-sub { font-size: 13px; color: #62638a; margin-bottom: 32px; }
    .login-card input {
      width: 100%; padding: 12px 16px; background: #191a28;
      border: 1px solid #28293d; border-radius: 10px; color: #eeeef8;
      font-size: 14px; outline: none; margin-bottom: 12px;
    }
    .login-card input:focus { border-color: #7c3aed; }
    .login-card button {
      width: 100%; padding: 13px; background: #7c3aed; border: none;
      border-radius: 10px; color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .login-card button:hover { background: #6d28d9; }
    .login-error { color: #f87171; font-size: 13px; margin-top: 10px; display: none; }

    /* ── Dashboard ── */
    #dashboard { display: none; }

    .topbar {
      height: 56px; background: #0f1018; border-bottom: 1px solid #1e2030;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; position: sticky; top: 0; z-index: 10;
    }
    .topbar-logo { font-size: 18px; font-weight: 700; letter-spacing: .15em; }
    .topbar-logo span { color: #a78bfa; }
    .topbar-right { display: flex; gap: 12px; align-items: center; }
    .badge { background: #1a0f38; color: #a78bfa; border: 1px solid #3d1a80; border-radius: 6px; padding: 4px 10px; font-size: 12px; font-weight: 600; }
    .btn-logout { background: transparent; border: 1px solid #28293d; border-radius: 8px; color: #62638a; font-size: 13px; cursor: pointer; padding: 6px 14px; }
    .btn-logout:hover { color: #f87171; border-color: #f87171; }

    .content { padding: 28px 32px; }

    /* ── Summary cards ── */
    .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: #13141f; border: 1px solid #1e2030; border-radius: 14px; padding: 20px 22px;
    }
    .stat-label { font-size: 11px; color: #62638a; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 700; color: #eeeef8; }
    .stat-value.purple { color: #a78bfa; }
    .stat-value.green { color: #34d399; }

    /* ── Table ── */
    .table-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
    }
    .table-title { font-size: 15px; font-weight: 700; color: #eeeef8; letter-spacing: .02em; }
    .search-input {
      padding: 8px 14px; background: #191a28; border: 1px solid #28293d;
      border-radius: 8px; color: #eeeef8; font-size: 13px; outline: none; width: 240px;
    }
    .search-input:focus { border-color: #7c3aed; }

    .table-wrap { overflow-x: auto; border-radius: 14px; border: 1px solid #1e2030; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: #0f1018; }
    th {
      padding: 12px 16px; font-size: 11px; font-weight: 600; color: #62638a;
      text-transform: uppercase; letter-spacing: .06em; text-align: left; white-space: nowrap;
    }
    tbody tr { border-top: 1px solid #0e0f1a; transition: background .1s; }
    tbody tr:hover { background: #13141f; }
    td { padding: 13px 16px; font-size: 13px; color: #eeeef8; vertical-align: middle; }
    td.muted { color: #62638a; }
    td.mono { font-family: 'Courier New', monospace; font-size: 12px; color: #9898b8; }

    .pill {
      display: inline-block; padding: 3px 9px; border-radius: 20px;
      font-size: 11px; font-weight: 600; letter-spacing: .03em;
    }
    .pill-green { background: #052e16; color: #34d399; border: 1px solid #166534; }
    .pill-purple { background: #1a0f38; color: #a78bfa; border: 1px solid #3d1a80; }
    .pill-gray { background: #191a28; color: #62638a; border: 1px solid #28293d; }
    .pill-yellow { background: #1c1500; color: #fbbf24; border: 1px solid #92400e; }

    .num { font-weight: 600; color: #a78bfa; }
    .num.green { color: #34d399; }
    .num.gray { color: #46476a; }

    .loading { text-align: center; padding: 60px; color: #46476a; font-size: 14px; }

    @media (max-width: 900px) {
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- Login screen -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo">OR<span>B</span>IT</div>
    <p class="login-sub">Admin Dashboard</p>
    <input type="password" id="admin-key" placeholder="Admin secret key" autocomplete="off">
    <button onclick="login()">Access dashboard</button>
    <p class="login-error" id="login-error">Invalid key — try again</p>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="topbar">
    <span class="topbar-logo">OR<span>B</span>IT <span style="color:#46476a;font-size:13px;font-weight:400;margin-left:8px;letter-spacing:normal">Admin</span></span>
    <div class="topbar-right">
      <span class="badge" id="last-refresh">Loading...</span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="content">
    <!-- Summary -->
    <div class="summary-grid">
      <div class="stat-card">
        <div class="stat-label">Total Users</div>
        <div class="stat-value purple" id="sum-users">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Amazon Gen Tasks</div>
        <div class="stat-value" id="sum-gen">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Invite Tasks</div>
        <div class="stat-value" id="sum-invite">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Accounts Created</div>
        <div class="stat-value green" id="sum-accounts">—</div>
      </div>
    </div>

    <!-- Users table -->
    <div class="table-header">
      <span class="table-title">USERS</span>
      <input class="search-input" type="text" placeholder="Search by email or username..." oninput="filterTable(this.value)">
    </div>
    <div class="table-wrap">
      <table id="users-table">
        <thead>
          <tr>
            <th>User</th>
            <th>License Key</th>
            <th>Gen Tasks</th>
            <th>Invite Tasks</th>
            <th>Accounts Created</th>
            <th>App Opens</th>
            <th>Last Active</th>
            <th>Registered</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="8" class="loading">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API = 'https://orbit-backend-production-2c2f.up.railway.app'
let adminKey = ''
let allUsers = []

function login() {
  const key = document.getElementById('admin-key').value.trim()
  if (!key) return
  adminKey = key
  loadDashboard()
}

document.getElementById('admin-key').addEventListener('keydown', e => {
  if (e.key === 'Enter') login()
})

async function loadDashboard() {
  try {
    const [usersRes, sumRes] = await Promise.all([
      fetch(`${API}/api/admin/users`, { headers: { 'x-admin-key': adminKey } }),
      fetch(`${API}/api/admin/summary`, { headers: { 'x-admin-key': adminKey } })
    ])

    if (usersRes.status === 401) {
      document.getElementById('login-error').style.display = 'block'
      return
    }

    document.getElementById('login-screen').style.display = 'none'
    document.getElementById('dashboard').style.display = 'block'

    const users = await usersRes.json()
    const summary = await sumRes.json()
    allUsers = users

    document.getElementById('sum-users').textContent = summary.total_users
    document.getElementById('sum-gen').textContent = Number(summary.total_gen).toLocaleString()
    document.getElementById('sum-invite').textContent = Number(summary.total_invite).toLocaleString()
    document.getElementById('sum-accounts').textContent = Number(summary.total_accounts).toLocaleString()

    const now = new Date()
    document.getElementById('last-refresh').textContent = `Refreshed ${now.toLocaleTimeString()}`

    renderTable(users)
  } catch (err) {
    alert('Error connecting to backend: ' + err.message)
  }
}

function renderTable(users) {
  const tbody = document.getElementById('table-body')
  if (!users.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="loading">No users yet</td></tr>'
    return
  }
  tbody.innerHTML = users.map(u => {
    const gen = parseInt(u.tasks_amazon_gen) || 0
    const invite = parseInt(u.tasks_amazon_invite) || 0
    const accounts = parseInt(u.accounts_created) || 0
    const opens = parseInt(u.app_opens) || 0
    const lastActive = u.last_active_at ? timeAgo(new Date(u.last_active_at)) : '<span class="muted">Never</span>'
    const registered = u.registered_at ? new Date(u.registered_at).toLocaleDateString() : '—'
    const licPill = u.license_key
      ? `<span class="pill pill-purple">${u.license_key}</span>`
      : `<span class="pill pill-gray">None</span>`
    return `
      <tr>
        <td>
          <div style="font-weight:600">${u.username || '—'}</div>
          <div style="font-size:12px;color:#62638a;margin-top:2px">${u.email}</div>
        </td>
        <td>${licPill}</td>
        <td class="${gen > 0 ? 'num' : 'num gray'}">${gen.toLocaleString()}</td>
        <td class="${invite > 0 ? 'num' : 'num gray'}">${invite.toLocaleString()}</td>
        <td class="${accounts > 0 ? 'num green' : 'num gray'}">${accounts.toLocaleString()}</td>
        <td class="${opens > 0 ? 'num' : 'num gray'}">${opens}</td>
        <td>${lastActive}</td>
        <td class="muted">${registered}</td>
      </tr>
    `
  }).join('')
}

function filterTable(query) {
  const q = query.toLowerCase()
  const filtered = q ? allUsers.filter(u =>
    u.email.toLowerCase().includes(q) ||
    (u.username || '').toLowerCase().includes(q) ||
    (u.license_key || '').toLowerCase().includes(q)
  ) : allUsers
  renderTable(filtered)
}

function timeAgo(date) {
  const seconds = Math.floor((new Date() - date) / 1000)
  if (seconds < 60) return 'Just now'
  const mins = Math.floor(seconds / 60)
  if (mins < 60) return `${mins}m ago`
  const hours = Math.floor(mins / 60)
  if (hours < 24) return `${hours}h ago`
  const days = Math.floor(hours / 24)
  if (days < 7) return `${days}d ago`
  return date.toLocaleDateString()
}

function logout() {
  adminKey = ''
  allUsers = []
  document.getElementById('dashboard').style.display = 'none'
  document.getElementById('login-screen').style.display = 'flex'
  document.getElementById('admin-key').value = ''
  document.getElementById('login-error').style.display = 'none'
}

// Auto-refresh every 60s
setInterval(() => { if (adminKey) loadDashboard() }, 60000)
</script>
</body>
</html>
